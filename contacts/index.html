<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>

    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/contacts.css">
    <link rel="stylesheet" href="../style/header.css">
    <link rel="stylesheet" href="../style/footer.css">
    <link rel="stylesheet" href="../style/responsive.css">
    <link rel="stylesheet" href="../style/animations.css">
</head>
<body>
<header id="header">
    <div class="header container">
        <nav class="header-btns">
            <a href="../" class="header-btn">ГЛАВНАЯ</a>
            <a href="../#uslugi" class="header-btn">УСЛУГИ</a>
            <a href="../#tarif" class="header-btn">ТАРИФЫ</a>
            <a href="./" class="header-btn">КОНТАКТЫ</a>
        </nav>
    </div>
</header>

<main class="content">
    <div class="content-1 container reveal reveal--up" data-stagger-group data-stagger-base="120">
        <h2 class="contacts-title reveal reveal--title" style="margin-top: 50px" data-stagger data-once>НАШИ КОНТАКТЫ</h2>

        <div class="contacts-block">
            <aside class="contacts-panel" data-stagger-group data-stagger-base="120">
                <div class="contact-row" data-stagger data-once>
                    <img src="../content/map-dot.svg" alt="" class="icon">
                    <div class="contact-value">
                        Г. Астана, Улица 1, Офис 1
                    </div>
                </div>

                <div class="contact-row" data-stagger data-once>
                    <img src="../content/telephone.svg" alt="" class="icon">
                    <div class="contact-value">
                        <a href="tel:+77007007070" class="contact-link">+77007007070</a>
                        <a href="tel:+77007007070" class="contact-link">+77007007070</a>
                    </div>
                </div>

                <div class="contact-row" data-stagger data-once>
                    <img src="../content/mail.svg" alt="" class="icon">
                    <a href="" class="contact-link">test@gmail.com</a>
                </div>

                <div class="social-links" data-stagger data-once>
                    <div class="social-item"><img src="../content/wa.svg" alt="WhatsApp" class="social-icon"><a href="">WhatsApp</a></div>
                    <div class="social-item"><img src="../content/insta.svg" alt="Instagram" class="social-icon"><a href="">Instagram</a></div>
                    <div class="social-item"><img src="../content/facebook.svg" alt="Facebook" class="social-icon"><a href="">Facebook</a></div>
                </div>
            </aside>

            <div class="contacts-map reveal reveal--up" data-stagger data-once>
                <iframe src="https://yandex.ru/map-widget/v1/?um=constructor%3Af4182b186e1511222f6b902c5936198f9cbc16899149a8d6de2ad9a881593dec&amp;source=constructor" width="100%" height="400" frameborder="0"></iframe>
            </div>
        </div>
    </div>
</main>

<footer id="footer">
    <div class="footer container">
        <div class="footer-col">
            <h3></h3>
        </div>

        <div class="footer-col">
            <h3></h3>
        </div>

        <div class="footer-col">
            <h3></h3>
        </div>

        <div class="footer-col">
            <h3>СОЦ СЕТИ</h3>

            <div class="footer-social">
                <a href="" target="_blank">
                    <img src="../content/wa.svg" alt="Whatsapp">
                </a>

                <a href="" target="_blank">
                    <img src="../content/insta.svg" alt="Instagram">
                </a>

                <a href="" target="_blank">
                    <img src="../content/facebook.svg" alt="Facebook">
                </a>
            </div>

            <h4>КАК ДО НАС ДОБРАТЬСЯ:</h4>
            <a href="" class="footer-map">Яндекс</a>
            <a href="" class="footer-map">2GIS</a>
        </div>
    </div>
</footer>
<script src="../scripts/header.js"></script>
<script src="../scripts/animations.js"></script>
</body>
</html>
